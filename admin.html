<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Rosin & Concilia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C5A059;
            --gold-dark: #9B7B3A;
            --gold-grad: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728);
            --dark: #1A1A2E;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --info: #3498DB;
        }
        body { font-family: 'Montserrat', sans-serif; background: #F0F2F5; }
        .login-screen {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #1A1A2E, #16213E);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 30px;
            width: 400px; text-align: center;
        }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; }
        .login-card button { background: var(--gold-grad); border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .admin-container { display: none; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .admin-header {
            background: white; padding: 20px 30px; border-radius: 20px;
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px; margin-bottom: 30px;
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: white; padding: 20px; border-radius: 20px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: var(--gold); }
        .btn { padding: 12px 25px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; }
        .btn-scan { background: var(--gold-grad); color: white; }
        .filters {
            background: white; padding: 20px; border-radius: 20px;
            display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px;
        }
        .filter-group { flex: 1; min-width: 150px; }
        .filter-group select, .filter-group input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .table-container {
            background: white; border-radius: 20px; overflow: auto;
        }
        .table-header { padding: 20px; background: var(--dark); color: white; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .badge-confirmed { background: var(--success); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; display: inline-block; }
        .badge-pending { background: var(--warning); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; display: inline-block; }
        .badge-scanned { background: var(--info); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; display: inline-block; }
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            align-items: center; justify-content: center; z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; padding: 30px; border-radius: 30px;
            max-width: 450px; width: 90%; text-align: center;
        }
        #scannerVideo { width: 100%; height: 280px; object-fit: cover; background: #000; border-radius: 15px; margin: 15px 0; }
        .notification {
            position: fixed; bottom: 20px; right: 20px; padding: 14px 24px;
            border-radius: 12px; color: white; z-index: 3000; animation: slide 0.3s ease;
        }
        @keyframes slide { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .notification.success { background: var(--success); }
        .notification.error { background: var(--danger); }
        @media (max-width: 768px) { th, td { font-size: 0.75rem; padding: 8px; } }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <i class="fas fa-crown" style="font-size: 3rem; color: var(--gold);"></i>
            <h2>Espace organisateur</h2>
            <input type="email" id="adminEmail" placeholder="admin@rosin-concilia.com">
            <input type="password" id="adminPass" placeholder="Mot de passe">
            <button onclick="loginAdmin()">Connexion</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-chalkboard-user"></i> Dashboard – Rosin & Concilia</h1>
            <div>
                <button class="btn" onclick="exportList()" style="background: var(--success); color:white;"><i class="fas fa-download"></i> Exporter CSV</button>
                <button class="btn" onclick="logoutAdmin()" style="background: var(--danger); color:white;">Déconnexion</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-users"></i><h3>Total inscrits</h3><div class="stat-value" id="totalCount">0</div></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><h3>Confirmés</h3><div class="stat-value" id="confirmedCount">0</div></div>
            <div class="stat-card"><i class="fas fa-qrcode"></i><h3>Entrés (scannés)</h3><div class="stat-value" id="scannedCount">0</div></div>
            <div class="stat-card"><i class="fas fa-clock"></i><h3>Non scannés</h3><div class="stat-value" id="pendingCount">0</div></div>
        </div>

        <div style="margin-bottom: 20px;">
            <button class="btn btn-scan" onclick="openScanner()"><i class="fas fa-camera"></i> Scanner QR code à l'entrée</button>
        </div>

        <div class="filters">
            <div class="filter-group"><label>Statut</label><select id="statusFilter" onchange="renderTable()"><option value="all">Tous</option><option value="confirmed">Confirmés</option><option value="scanned">Déjà entrés</option><option value="pending">Non entrés</option></select></div>
            <div class="filter-group"><label>Table</label><select id="tableFilter" onchange="renderTable()"><option value="all">Toutes</option><option value="fantan">Fantan</option><option value="coca">Coca</option><option value="temba">Temba</option><option value="wisky">Wisky</option><option value="champagne">Champagne</option></select></div>
            <div class="filter-group"><label>Rechercher</label><input type="text" id="searchInput" placeholder="Nom ou téléphone..." onkeyup="renderTable()"></div>
        </div>

        <div class="table-container">
            <div class="table-header"><span><i class="fas fa-list"></i> Invités inscrits</span><span id="resultInfo"></span></div>
            <table id="guestTable"><thead><tr><th>Nom</th><th>Téléphone</th><th>Relation</th><th>Table</th><th>Statut</th><th>Action</th></tr></thead><tbody id="tableBody"></tbody></table>
        </div>
    </div>

    <div id="scannerModal" class="modal"><div class="modal-content"><h3><i class="fas fa-qrcode"></i> Scanner le pass</h3><video id="scannerVideo" playsinline></video><button onclick="closeScanner()" style="margin-top: 15px; padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer;">Fermer</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASCqKVU-tchKTnjkwemo_8DORutXiGQCc",
            authDomain: "invitation-electronic.firebaseapp.com",
            projectId: "invitation-electronic",
            storageBucket: "invitation-electronic.firebasestorage.app",
            messagingSenderId: "896364908517",
            appId: "1:896364908517:web:61c45584bac322b8a0690c"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let allGuests = [];
        let scannerActive = false;
        let scannerStream = null;

        window.loginAdmin = () => {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(() => alert("Identifiants incorrects"));
        };
        window.logoutAdmin = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "admin@rosin-concilia.com") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadData();
            } else if (user) { signOut(auth); }
            else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('adminPanel').style.display = 'none';
            }
        });

        function loadData() {
            onSnapshot(collection(db, "invites"), (snap) => {
                allGuests = [];
                let total = 0, confirmed = 0, scanned = 0;
                snap.forEach(doc => {
                    let data = doc.data();
                    allGuests.push({ id: doc.id, ...data });
                    total++;
                    if (data.isConfirmed) confirmed++;
                    if (data.isScanned) scanned++;
                });
                document.getElementById('totalCount').innerText = total;
                document.getElementById('confirmedCount').innerText = confirmed;
                document.getElementById('scannedCount').innerText = scanned;
                document.getElementById('pendingCount').innerText = confirmed - scanned;
                renderTable();
            });
        }

        window.renderTable = () => {
            const status = document.getElementById('statusFilter').value;
            const tableFilter = document.getElementById('tableFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allGuests.filter(g => {
                if (status === 'scanned' && !g.isScanned) return false;
                if (status === 'pending' && g.isScanned) return false;
                if (status === 'confirmed' && !g.isConfirmed) return false;
                if (tableFilter !== 'all' && g.table !== tableFilter) return false;
                if (search && !g.name?.toLowerCase().includes(search) && !g.phone?.includes(search)) return false;
                return true;
            });
            document.getElementById('resultInfo').innerHTML = `${filtered.length} invité(s)`;
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            filtered.forEach(g => {
                let statusBadge = g.isScanned ? '<span class="badge-scanned">✅ Entré</span>' : (g.isConfirmed ? '<span class="badge-confirmed">Confirmé</span>' : '<span class="badge-pending">En attente</span>');
                tbody.innerHTML += `<tr><td><strong>${g.name || '—'}</strong></td><td>${g.phone || '—'}</td><td>${g.relation || '—'}</td><td><span style="background:#E8D5A3;padding:4px 10px;border-radius:20px;">${g.table || '—'}</span></td><td>${statusBadge}</td><td><button class="btn" onclick="markEntry('${g.id}')" style="background:var(--info);color:white;padding:5px 12px;" ${g.isScanned ? 'disabled' : ''}><i class="fas fa-check"></i> Valider entrée</button></td></tr>`;
            });
        };

        window.markEntry = async (id) => {
            if (confirm("Valider l'entrée de cet invité ?")) {
                await updateDoc(doc(db, "invites", id), { isScanned: true, scanTime: new Date() });
                showNotif("✅ Entrée validée", "success");
            }
        };

        // Scanner QR code
        window.openScanner = () => {
            document.getElementById('scannerModal').classList.add('active');
            startCamera();
        };
        window.closeScanner = () => {
            stopCamera();
            document.getElementById('scannerModal').classList.remove('active');
        };
        async function startCamera() {
            const video = document.getElementById('scannerVideo');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                scannerStream = stream;
                video.srcObject = stream;
                video.play();
                scannerActive = true;
                scanLoop();
            } catch(e) { showNotif("Caméra inaccessible", "error"); closeScanner(); }
        }
        async function scanLoop() {
            if (!scannerActive) return;
            const video = document.getElementById('scannerVideo');
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                if (typeof jsQR === 'undefined') await new Promise(r => { let s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js'; s.onload = r; document.head.appendChild(s); });
                const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const qr = jsQR(img.data, canvas.width, canvas.height);
                if (qr) {
                    try {
                        const data = JSON.parse(qr.data);
                        if (data.id) {
                            stopCamera();
                            closeScanner();
                            await validateGuest(data.id);
                            return;
                        }
                    } catch(e) { await searchByText(qr.data); }
                }
            }
            setTimeout(scanLoop, 400);
        }
        async function searchByText(text) {
            const q = query(collection(db, "invites"), where("name", "==", text));
            const snap = await getDocs(q);
            if (!snap.empty) { stopCamera(); closeScanner(); await validateGuest(snap.docs[0].id); }
        }
        async function validateGuest(id) {
            const ref = doc(db, "invites", id);
            const snap = await getDocs(query(collection(db, "invites"), where("id", "==", id)));
            // alternative directe
            const docSnap = await import("firebase/firestore").then(({ getDoc }) => getDoc(ref));
            if (!docSnap.exists()) { showNotif("Invitée non trouvé", "error"); return; }
            const data = docSnap.data();
            if (data.isScanned) { showNotif(`❌ ${data.name} est déjà entré`, "error"); return; }
            await updateDoc(ref, { isScanned: true, scanTime: new Date() });
            showNotif(`✅ ${data.name} – Bienvenue ! Table ${data.table || 'N/A'}`, "success");
        }
        function stopCamera() { scannerActive = false; if (scannerStream) scannerStream.getTracks().forEach(t => t.stop()); }
        function showNotif(msg, type) { let d = document.createElement('div'); d.className = `notification ${type}`; d.innerText = msg; document.body.appendChild(d); setTimeout(() => d.remove(), 3000); }

        window.exportList = () => {
            let csv = [["Nom","Téléphone","Email","Relation","Table","Boisson","Statut entrée"]];
            allGuests.forEach(g => csv.push([g.name||'', g.phone||'', g.email||'', g.relation||'', g.table||'', g.drink||'', g.isScanned ? "Entré" : "Non entré"]));
            let blob = new Blob([csv.map(r => r.join(",")).join("\n")], {type: "text/csv"});
            let a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "invites_mariage.csv"; a.click(); URL.revokeObjectURL(a.href);
        };
    </script>
</body>
</html>
