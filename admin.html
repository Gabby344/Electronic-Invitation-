<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin | Concilia & Rosin</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; flex: 1; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #BF953F; color: white; }
    </style>
</head>
<body>
    <h1>Gestion des Invités</h1>
    <div class="stats">
        <div class="stat-card"><h3>Inscriptions</h3><p id="count">0</p></div>
        <div class="stat-card"><h3>Total Convives</h3><p id="total">0</p></div>
    </div>
    
    <table id="admin-table">
        <thead>
            <tr>
                <th>Nom Complet</th>
                <th>Nombre</th>
                <th>ID Unique (QR)</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASCqKVU-tchKTnjkwemo_8DORutXiGQCc",
            authDomain: "invitation-electronic.firebaseapp.com",
            projectId: "invitation-electronic",
            storageBucket: "invitation-electronic.firebasestorage.app",
            messagingSenderId: "896364908517",
            appId: "1:896364908517:web:61c45584bac322b8a0690c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "invites"), (snapshot) => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            let tCount = 0;
            let tConvives = 0;

            snapshot.forEach(doc => {
                const data = doc.data();
                tCount++;
                tConvives += parseInt(data.guests);
                list.innerHTML += `<tr><td>${data.fullname}</td><td>${data.guests}</td><td>${doc.id}</td></tr>`;
            });
            document.getElementById('count').innerText = tCount;
            document.getElementById('total').innerText = tConvives;
        });
    </script>
</body>
</html>
