<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin | Rosin & Concilia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; padding: 20px; }
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-card { background: white; padding: 40px; border-radius: 10px; width: 350px; text-align: center; }
        
        .container { max-width: 1000px; margin: auto; display: none; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card span { font-size: 2rem; font-weight: 700; color: #BF953F; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #BF953F; color: white; }
        
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #BF953F; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <h2>Accès Admin</h2>
            <input type="email" id="adminEmail" placeholder="Email">
            <input type="password" id="adminPass" placeholder="Mot de passe">
            <button onclick="login()">Se connecter</button>
        </div>
    </div>

    <div id="admin-content" class="container">
        <header style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>Liste des Invités</h1>
            <button onclick="logout()" style="width: auto; background: #ff4444;">Déconnexion</button>
        </header>

        <div class="stats">
            <div class="stat-card"><p>Inscriptions</p><span id="count">0</span></div>
            <div class="stat-card"><p>Total Personnes</p><span id="total">0</span></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nom de l'invité</th>
                    <th>Type</th>
                    <th>Relation</th>
                    <th>ID / QR</th>
                </tr>
            </thead>
            <tbody id="guest-list"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASCqKVU-tchKTnjkwemo_8DORutXiGQCc",
            authDomain: "invitation-electronic.firebaseapp.com",
            projectId: "invitation-electronic",
            storageBucket: "invitation-electronic.firebasestorage.app",
            messagingSenderId: "896364908517",
            appId: "1:896364908517:web:61c45584bac322b8a0690c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTHENTIFICATION ---
        window.login = () => {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Identifiants invalides"));
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadData();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('admin-content').style.display = 'none';
            }
        });

        // --- CHARGEMENT DATA ---
        function loadData() {
            onSnapshot(collection(db, "invites"), (snapshot) => {
                const list = document.getElementById('guest-list');
                list.innerHTML = "";
                let count = 0;
                let total = 0;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    count++;
                    total += (data.type === "Couple" ? 2 : 1);
                    list.innerHTML += `<tr><td>${data.name}</td><td>${data.type}</td><td>${data.relation}</td><td><code>${doc.id}</code></td></tr>`;
                });

                document.getElementById('count').innerText = count;
                document.getElementById('total').innerText = total;
            });
        }
    </script>
</body>
</html>
