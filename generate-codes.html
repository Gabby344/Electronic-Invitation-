<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Rosin & Concilia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C5A059;
            --gold-dark: #9B7B3A;
            --gold-grad: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728);
            --dark: #1A1A2E;
            --success: #2ECC71;
            --danger: #E74C3C;
            --warning: #F39C12;
            --info: #3498DB;
        }
        body { font-family: 'Montserrat', sans-serif; background: #F0F2F5; }
        .login-screen {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #1A1A2E, #16213E);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 30px;
            width: 400px; text-align: center;
        }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; }
        .login-card button { background: var(--gold-grad); border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .admin-container { display: none; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .admin-header {
            background: white; padding: 20px 30px; border-radius: 20px;
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: white; padding: 25px; border-radius: 20px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .stat-card .stat-value { font-size: 2.2rem; font-weight: 700; color: var(--gold); }
        .action-buttons { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; }
        .btn-gold { background: var(--gold-grad); color: white; }
        .btn-purple { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-red { background: var(--danger); color: white; }
        .filters {
            background: white; padding: 20px; border-radius: 20px;
            display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px;
        }
        .filter-group { flex: 1; min-width: 150px; }
        .filter-group select, .filter-group input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .guest-table-container {
            background: white; border-radius: 20px; overflow: auto;
        }
        .table-header { padding: 20px; background: var(--dark); color: white; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .status-confirmed { background: var(--success); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
        .status-pending { background: var(--warning); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
        .status-scanned { background: var(--info); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white; border-radius: 30px; width: 500px; max-width: 90%;
            max-height: 80vh; overflow-y: auto;
        }
        .modal-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .modal-body { padding: 25px; }
        .modal-footer { padding: 20px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 15px; }
        .cat-btn {
            padding: 8px 16px; border: 2px solid var(--gold); border-radius: 50px;
            background: white; cursor: pointer; margin: 5px;
        }
        .cat-btn.selected { background: var(--gold); color: white; }
        .notification {
            position: fixed; bottom: 20px; right: 20px; padding: 15px 25px;
            border-radius: 12px; color: white; z-index: 3000;
        }
        .notification.success { background: var(--success); }
        .notification.error { background: var(--danger); }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { th, td { font-size: 0.75rem; padding: 10px; } }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <i class="fas fa-crown" style="font-size: 3rem; color: var(--gold);"></i>
            <h2>Admin Mariage</h2>
            <input type="email" id="adminEmail" placeholder="admin@rosin-concilia.com">
            <input type="password" id="adminPass" placeholder="Mot de passe">
            <button onclick="login()">Connexion</button>
        </div>
    </div>

    <div id="adminContent" class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-crown"></i> Dashboard Rosin & Concilia</h1>
            <div>
                <button class="btn" onclick="refreshData()" style="background: var(--info); color:white;"><i class="fas fa-sync"></i> Actualiser</button>
                <button class="btn" onclick="exportCSV()" style="background: var(--success); color:white;"><i class="fas fa-download"></i> Export CSV</button>
                <button class="btn" onclick="logout()" style="background: var(--danger); color:white;">Déconnexion</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-users"></i><h3>Total</h3><div class="stat-value" id="stat-total">0</div></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><h3>Confirmés</h3><div class="stat-value" id="stat-confirmed">0</div></div>
            <div class="stat-card"><i class="fas fa-qrcode"></i><h3>Entrés</h3><div class="stat-value" id="stat-scanned">0</div></div>
            <div class="stat-card"><i class="fas fa-clock"></i><h3>En attente</h3><div class="stat-value" id="stat-pending">0</div></div>
            <div class="stat-card"><i class="fas fa-key"></i><h3>Sans code</h3><div class="stat-value" id="stat-no-code">0</div></div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-gold" onclick="openGenerateModal()"><i class="fas fa-magic"></i> Générer codes par catégorie</button>
            <button class="btn btn-purple" onclick="openAssignModal()"><i class="fas fa-tag"></i> Attribuer code individuel</button>
        </div>

        <div class="filters">
            <div class="filter-group"><label>Statut</label><select id="filter-status" onchange="renderTable()"><option value="all">Tous</option><option value="confirmed">Confirmés</option><option value="pending">En attente</option><option value="scanned">Entrés</option><option value="no-code">Sans code</option></select></div>
            <div class="filter-group"><label>Table</label><select id="filter-table" onchange="renderTable()"><option value="all">Toutes</option><option value="fantan">Fantan</option><option value="coca">Coca</option><option value="temba">Temba</option><option value="wisky">Wisky</option><option value="champagne">Champagne</option></select></div>
            <div class="filter-group"><label>Recherche</label><input type="text" id="search-input" placeholder="Nom..." onkeyup="renderTable()"></div>
        </div>

        <div class="guest-table-container">
            <div class="table-header"><span><i class="fas fa-list"></i> Invités</span><span id="result-count"></span></div>
            <table><thead><tr><th>Nom</th><th>Téléphone</th><th>Relation</th><th>Table</th><th>Code</th><th>Statut</th><th>Actions</th></tr></thead><tbody id="guest-list"></tbody></table>
        </div>
    </div>

    <!-- Modals -->
    <div id="generateModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3>Générer codes</h3><span onclick="closeGenerateModal()" style="cursor:pointer">&times;</span></div><div class="modal-body"><div id="cat-buttons"></div><select id="code-format" style="width:100%; padding:10px; margin-top:15px;"><option value="standard">Standard</option><option value="numbered">Numéroté INV-0001</option></select><div id="preview" style="margin-top:15px; background:#f5f5f5; padding:15px; border-radius:15px;"></div></div><div class="modal-footer"><button class="btn btn-gold" onclick="generateCodes()">Générer</button><button onclick="closeGenerateModal()">Annuler</button></div></div></div>

    <div id="assignModal" class="modal-overlay"><div class="modal-content"><div class="modal-header"><h3>Attribuer code</h3><span onclick="closeAssignModal()" style="cursor:pointer">&times;</span></div><div class="modal-body"><select id="guest-select" style="width:100%; padding:12px;"></select><input type="text" id="custom-code" placeholder="Code personnalisé" style="width:100%; margin-top:15px; padding:12px; border-radius:10px;"><div id="assign-preview" style="margin-top:15px;"></div></div><div class="modal-footer"><button class="btn btn-purple" onclick="assignCode()">Attribuer</button><button onclick="closeAssignModal()">Annuler</button></div></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASCqKVU-tchKTnjkwemo_8DORutXiGQCc",
            authDomain: "invitation-electronic.firebaseapp.com",
            projectId: "invitation-electronic",
            storageBucket: "invitation-electronic.firebasestorage.app",
            messagingSenderId: "896364908517",
            appId: "1:896364908517:web:61c45584bac322b8a0690c"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let allGuests = [];

        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('adminEmail').value, document.getElementById('adminPass').value).catch(()=>alert("Identifiants invalides"));
        window.logout = () => signOut(auth);
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "admin@rosin-concilia.com") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadData();
            } else if (user) signOut(auth);
            else { document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('adminContent').style.display = 'none'; }
        });

        function loadData() {
            onSnapshot(collection(db, "invites"), (snap) => {
                allGuests = [];
                let total=0, confirmed=0, scanned=0, pending=0, noCode=0;
                snap.forEach(d => { let data=d.data(); let g={id:d.id,...data}; allGuests.push(g); total++; if(data.isConfirmed) confirmed++; if(data.isScanned) scanned++; if(!data.isConfirmed) pending++; if(!data.uniqueCode) noCode++; });
                document.getElementById('stat-total').innerText=total;
                document.getElementById('stat-confirmed').innerText=confirmed;
                document.getElementById('stat-scanned').innerText=scanned;
                document.getElementById('stat-pending').innerText=pending;
                document.getElementById('stat-no-code').innerText=noCode;
                renderTable();
                updateGuestSelect();
            });
        }
        window.refreshData = () => { loadData(); showNotification("Actualisé","success"); };

        function renderTable() {
            let filtered = allGuests.filter(g => {
                let status = document.getElementById('filter-status').value;
                if(status==='confirmed' && !g.isConfirmed) return false;
                if(status==='pending' && g.isConfirmed) return false;
                if(status==='scanned' && !g.isScanned) return false;
                if(status==='no-code' && g.uniqueCode) return false;
                let table = document.getElementById('filter-table').value;
                if(table!=='all' && g.table!==table) return false;
                let search = document.getElementById('search-input').value.toLowerCase();
                if(search && !g.name?.toLowerCase().includes(search)) return false;
                return true;
            });
            document.getElementById('result-count').innerHTML = `${filtered.length} invité(s)`;
            let tbody = document.getElementById('guest-list'); tbody.innerHTML="";
            filtered.forEach(g => {
                let statusClass = g.isScanned ? 'status-scanned' : (g.isConfirmed ? 'status-confirmed' : 'status-pending');
                let statusText = g.isScanned ? 'Entré' : (g.isConfirmed ? 'Confirmé' : 'En attente');
                tbody.innerHTML += `<tr><td><strong>${g.name||'N/A'}</strong></td><td>${g.phone||'N/A'}</td><td>${g.relation||'N/A'}</td><td>${g.table||'N/A'}</td><td><code>${g.uniqueCode||'❌'}</code></td><td><span class="${statusClass}">${statusText}</span></td><td><button class="btn" onclick="viewGuest('${g.id}')" style="background:var(--info);color:white;padding:5px 10px;">👁️</button></td></tr>`;
            });
        }
        window.renderTable = renderTable;
        window.viewGuest = (id) => { let g=allGuests.find(x=>x.id===id); alert(`Invité: ${g.name}\nTél: ${g.phone}\nTable: ${g.table}\nCode: ${g.uniqueCode||'Non généré'}\nStatut: ${g.isScanned?'Entré':(g.isConfirmed?'Confirmé':'En attente')}`); };

        function updateGuestSelect() {
            let sel = document.getElementById('guest-select');
            sel.innerHTML = '<option value="">-- Sélectionner --</option>';
            allGuests.filter(g=>!g.uniqueCode).forEach(g=>sel.innerHTML+=`<option value="${g.id}">${g.name||'Invité'} - ${g.relation||''}</option>`);
        }
        function generateCode(name,format,i){ let p=name?name.substring(0,3).toUpperCase():'INV'; let r=Math.random().toString(36).substring(2,8).toUpperCase(); return format==='numbered'?`INV-${String(i+1).padStart(4,'0')}`:`${p}-${r}`; }
        window.openGenerateModal = () => {
            let cats = [{id:'no-code',name:'🔑 Sans code'},{id:'pending',name:'⏳ En attente'},{id:'all',name:'👥 Tous'}];
            document.getElementById('cat-buttons').innerHTML = cats.map(c=>`<button class="cat-btn" data-cat="${c.id}" onclick="selectCat('${c.id}')">${c.name}</button>`).join('');
            document.getElementById('generateModal').classList.add('active');
            window.selectedCat = 'no-code';
        };
        window.selectCat = (c) => { window.selectedCat=c; updatePreview(); };
        function updatePreview(){
            let guests = allGuests.filter(g=>{ if(window.selectedCat==='no-code') return !g.uniqueCode; if(window.selectedCat==='pending') return !g.isConfirmed; return true; });
            let format = document.getElementById('code-format').value;
            let preview = guests.slice(0,5).map((g,i)=>`<div>📌 ${g.name||'Invité'} → ${generateCode(g.name,format,i)}</div>`).join('');
            document.getElementById('preview').innerHTML = `<strong>${guests.length} invité(s)</strong><br>${preview}${guests.length>5?'...':''}`;
        }
        document.getElementById('code-format').addEventListener('change',updatePreview);
        window.generateCodes = async () => {
            let guests = allGuests.filter(g=>{ if(window.selectedCat==='no-code') return !g.uniqueCode; if(window.selectedCat==='pending') return !g.isConfirmed; return true; });
            let format = document.getElementById('code-format').value;
            let count=0;
            for(let i=0;i<guests.length;i++){
                if(!guests[i].uniqueCode){
                    await updateDoc(doc(db,"invites",guests[i].id),{uniqueCode:generateCode(guests[i].name,format,i)});
                    count++;
                }
            }
            showNotification(`${count} codes générés`,'success');
            closeGenerateModal();
            refreshData();
        };
        window.closeGenerateModal = () => document.getElementById('generateModal').classList.remove('active');
        window.openAssignModal = () => { updateGuestSelect(); document.getElementById('assignModal').classList.add('active'); };
        window.closeAssignModal = () => document.getElementById('assignModal').classList.remove('active');
        window.assignCode = async () => {
            let id = document.getElementById('guest-select').value;
            let code = document.getElementById('custom-code').value.trim().toUpperCase() || `INV-${Math.random().toString(36).substring(2,8).toUpperCase()}`;
            if(!id) return showNotification("Sélectionnez un invité","error");
            if(allGuests.find(g=>g.uniqueCode===code)) return showNotification("Code déjà utilisé","error");
            await updateDoc(doc(db,"invites",id),{uniqueCode:code});
            showNotification("Code attribué","success");
            closeAssignModal(); refreshData();
        };
        window.exportCSV = () => {
            let csv = [['Nom','Téléphone','Email','Relation','Table','Code','Statut']];
            allGuests.forEach(g=>csv.push([g.name||'',g.phone||'',g.email||'',g.relation||'',g.table||'',g.uniqueCode||'',g.isScanned?'Entré':(g.isConfirmed?'Confirmé':'En attente')]));
            let blob = new Blob([csv.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
            let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='invites.csv'; a.click();
        };
        function showNotification(msg,type){ let n=document.createElement('div'); n.className=`notification ${type}`; n.innerText=msg; document.body.appendChild(n); setTimeout(()=>n.remove(),3000); }
    </script>
</body>
</html>
