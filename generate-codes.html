<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de codes | Rosin & Concilia</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #1A1A2E, #16213E); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 30px; padding: 40px; max-width: 800px; width: 100%; }
        h1 { color: #C5A059; text-align: center; margin-bottom: 10px; }
        .info { background: #f0f2f5; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .stats { background: linear-gradient(135deg, #C5A059, #9B7B3A); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .stats .number { font-size: 3rem; font-weight: 700; }
        button { background: linear-gradient(135deg, #C5A059, #9B7B3A); border: none; padding: 14px; border-radius: 50px; color: white; font-weight: 600; width: 100%; cursor: pointer; margin-bottom: 15px; }
        .log { background: #1e1e2e; border-radius: 15px; padding: 15px; max-height: 300px; overflow-y: auto; font-family: monospace; color: #ccc; }
        .log-entry { padding: 5px 0; border-bottom: 1px solid #333; }
        .log-entry.success { color: #2ECC71; }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-key"></i> Génération de codes</h1>
        <p style="text-align: center; margin-bottom: 20px;">Rosin & Concilia - Mariage 2026</p>
        <div class="stats">
            <p>📊 Invités</p>
            <div class="number" id="guestCount">—</div>
            <p id="codeStatus">Chargement...</p>
        </div>
        <button id="generateBtn"><i class="fas fa-magic"></i> Générer tous les codes manquants</button>
        <div class="log" id="log"><div class="log-entry">🟢 Prêt</div></div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyASCqKVU-tchKTnjkwemo_8DORutXiGQCc",
            authDomain: "invitation-electronic.firebaseapp.com",
            projectId: "invitation-electronic",
            storageBucket: "invitation-electronic.firebasestorage.app",
            messagingSenderId: "896364908517",
            appId: "1:896364908517:web:61c45584bac322b8a0690c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        function addLog(msg,type){ let l=document.getElementById('log'); let d=document.createElement('div'); d.className=`log-entry ${type}`; d.innerText=`[${new Date().toLocaleTimeString()}] ${msg}`; l.appendChild(d); l.scrollTop=l.scrollHeight; }
        async function loadStats(){
            let snap=await getDocs(collection(db,"invites"));
            let total=snap.size, withCodes=0;
            snap.forEach(d=>{ if(d.data().uniqueCode) withCodes++; });
            document.getElementById('guestCount').innerText=total;
            document.getElementById('codeStatus').innerHTML=`✅ ${withCodes} codes | ⚠️ ${total-withCodes} manquants`;
            return {total,withCodes,withoutCodes:total-withCodes};
        }
        window.generateBtn.onclick=async()=>{
            let btn=document.getElementById('generateBtn');
            btn.innerHTML='<span class="loading"></span> Génération...';
            btn.disabled=true;
            let snap=await getDocs(collection(db,"invites"));
            let count=0;
            for(let docSnap of snap.docs){
                let data=docSnap.data();
                if(!data.uniqueCode){
                    let prefix=data.name?data.name.substring(0,3).toUpperCase().replace(/[^A-Z]/g,'X'):'INV';
                    let code=`${prefix}-${Math.random().toString(36).substring(2,8).toUpperCase()}`;
                    await updateDoc(doc(db,"invites",docSnap.id),{uniqueCode:code});
                    addLog(`✅ ${data.name||'Invité'}: ${code}`,'success');
                    count++;
                }
            }
            addLog(`🎉 Terminé ! ${count} codes générés`,'success');
            btn.innerHTML='<i class="fas fa-magic"></i> Générer tous les codes manquants';
            btn.disabled=false;
            loadStats();
        };
        loadStats();
    </script>
</body>
</html>
