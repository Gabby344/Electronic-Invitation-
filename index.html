<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Confirmation – Rosin & Concilia</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #C5A059;
            --gold-dark: #9B7B3A;
            --gold-light: #E8D5A3;
            --gold-grad: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728);
            --dark: #1A1A2E;
            --cream: #FFF9F0;
            --success: #2ECC71;
            --error: #E74C3C;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--cream); }
        .hero {
            position: relative; height: 55vh; min-height: 350px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; color: white; text-align: center;
        }
        .hero-bg { position: absolute; inset: 0; z-index: -2; }
        .hero-bg .slide {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1.8s ease;
        }
        .hero-bg .slide.active { opacity: 1; }
        .hero-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(2px); z-index: -1; }
        .hero-content { z-index: 10; padding: 30px; border-radius: 30px; backdrop-filter: blur(8px); background: rgba(0,0,0,0.3); }
        .shimmer {
            font-family: 'Playfair Display', serif;
            background: var(--gold-grad);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 0% { background-position: -100% center; } 100% { background-position: 200% center; } }
        .card {
            max-width: 750px; margin: -70px auto 50px;
            background: white; padding: 40px; border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); position: relative; z-index: 20;
        }
        h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark); }
        input, select {
            width: 100%; padding: 14px; border: 1px solid #ddd;
            border-radius: 14px; font-family: inherit; font-size: 1rem;
        }
        input:focus, select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(197,160,89,0.1); }
        .btn-gold {
            background: var(--gold-grad); border: none; padding: 15px;
            width: 100%; font-weight: 700; border-radius: 50px;
            cursor: pointer; font-size: 1rem; transition: 0.3s;
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(191,149,63,0.3); }
        .btn-outline { background: none; border: 2px solid var(--gold); padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: 600; }
        .ticket { background: linear-gradient(135deg, #fff, #fef9e6); padding: 30px; border-radius: 25px; border: 2px dashed var(--gold); text-align: center; margin-top: 25px; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
        .notification {
            position: fixed; bottom: 20px; right: 20px; padding: 15px 25px;
            border-radius: 14px; color: white; z-index: 1000;
            animation: slideIn 0.3s ease; font-weight: 500;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .notification.success { background: var(--success); }
        .notification.error { background: var(--error); }
        .loading { display: inline-block; width: 18px; height: 18px; border: 2px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { text-align: center; padding: 30px; font-size: 0.7rem; background: var(--dark); color: white; margin-top: 40px; }
        @media (max-width: 768px) { .card { padding: 25px; margin: -60px 15px 30px; } .hero-content h1 { font-size: 1.6rem; } }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-bg">
            <div class="slide active" style="background-image: url('conciliaetrosin1.jpg')"></div>
            <div class="slide" style="background-image: url('conciliaetrosin2.jpg')"></div>
            <div class="slide" style="background-image: url('conciliaetrosin3.jpg')"></div>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="shimmer" style="font-size: 2.5rem;">Rosin & Concilia</h1>
            <p>20 JUIN 2026 | LUBUMBASHI</p>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-heart"></i> Confirmer ma présence</h2>
        <p style="text-align: center; margin-bottom: 25px;">Merci de remplir ce formulaire pour confirmer votre venue.</p>
        
        <form id="guestForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nom complet *</label>
                <input type="text" id="fullName" required placeholder="Jean Mukendi">
            </div>
            <div class="form-group">
                <label><i class="fas fa-venus-mars"></i> Sexe *</label>
                <select id="gender"><option>Homme</option><option>Femme</option></select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-users"></i> Type de présence *</label>
                <select id="presenceType"><option>Solo</option><option>En couple</option><option>Avec famille</option></select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-handshake"></i> Relation avec les mariés *</label>
                <select id="relation">
                    <option>Famille proche</option><option>Famille éloignée</option>
                    <option>Ami proche</option><option>Ami(e)</option><option>Collègue</option><option>VIP</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Téléphone *</label>
                <input type="tel" id="phone" required placeholder="+243 XXX XXX XXX">
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email (optionnel)</label>
                <input type="email" id="email" placeholder="exemple@email.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-glass-cheers"></i> Boisson préférée</label>
                <select id="drink">
                    <option>Whisky</option><option>Tembo</option><option>Coca</option>
                    <option>Champagne</option><option>Jus</option><option>Eau</option>
                </select>
            </div>
            <button type="submit" class="btn-gold" id="submitBtn"><i class="fas fa-check-circle"></i> Confirmer & obtenir mon pass</button>
        </form>

        <div id="ticketBlock" style="display: none;">
            <div class="ticket" id="ticketArea">
                <h3 class="shimmer"><i class="fas fa-ticket-alt"></i> PASS ENTRÉE</h3>
                <div style="margin: 15px 0;"><strong>Invité(e):</strong> <span id="displayName"></span><br><strong>Table:</strong> <span id="displayTable"></span><br><strong>Boisson:</strong> <span id="displayDrink"></span></div>
                <div id="qrcodeContainer"></div>
                <p>Samedi 20 Juin 2026 - 19h00<br>Salle Aurore, Lubumbashi</p>
                <p style="font-size: 0.7rem; margin-top: 10px;">Présentez ce QR code à l'entrée</p>
            </div>
            <button class="btn-outline" id="downloadPassBtn" style="margin-top: 15px; width: 100%;"><i class="fas fa-download"></i> Télécharger mon pass</button>
        </div>
    </div>

    <div class="footer"><i class="fas fa-heart" style="color: var(--gold);"></i><br>Rosin & Concilia - 2026</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASCqKVU-tchKTnjkwemo_8DORutXiGQCc",
            authDomain: "invitation-electronic.firebaseapp.com",
            projectId: "invitation-electronic",
            storageBucket: "invitation-electronic.firebasestorage.app",
            messagingSenderId: "896364908517",
            appId: "1:896364908517:web:61c45584bac322b8a0690c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Carrousel
        let idx = 0;
        const slides = document.querySelectorAll('.slide');
        if (slides.length) {
            setInterval(() => {
                slides[idx].classList.remove('active');
                idx = (idx + 1) % slides.length;
                slides[idx].classList.add('active');
            }, 4500);
        }

        const tables = ['fantan', 'coca', 'temba', 'wisky', 'champagne', 'elanc', 'sansbo'];
        
        function showMessage(msg, type) {
            const div = document.createElement('div');
            div.className = `notification ${type}`;
            div.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        document.getElementById('guestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<span class="loading"></span> Enregistrement...';
            btn.disabled = true;

            const name = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            // Vérifier si l'invité existe déjà
            const existing = await getDocs(query(collection(db, "invites"), where("phone", "==", phone)));
            if (!existing.empty) {
                showMessage("Ce numéro a déjà été enregistré. Contactez l'organisateur.", "error");
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Confirmer & obtenir mon pass';
                btn.disabled = false;
                return;
            }

            const randomTable = tables[Math.floor(Math.random() * tables.length)];
            const guestData = {
                name: name,
                gender: document.getElementById('gender').value,
                type: document.getElementById('presenceType').value,
                relation: document.getElementById('relation').value,
                phone: phone,
                email: document.getElementById('email').value,
                drink: document.getElementById('drink').value,
                table: randomTable,
                isConfirmed: true,
                isScanned: false,
                createdAt: new Date()
            };

            try {
                const docRef = await addDoc(collection(db, "invites"), guestData);
                const qrData = JSON.stringify({ id: docRef.id, name: name, table: randomTable });
                
                document.getElementById('displayName').innerText = name;
                document.getElementById('displayTable').innerText = randomTable;
                document.getElementById('displayDrink').innerText = document.getElementById('drink').value;
                
                const qrDiv = document.getElementById('qrcodeContainer');
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: qrData, width: 170, height: 170 });
                
                document.getElementById('guestForm').style.display = 'none';
                document.getElementById('ticketBlock').style.display = 'block';
                showMessage("✅ Inscription réussie ! Téléchargez votre pass.", "success");
            } catch (err) {
                console.error(err);
                showMessage("Erreur lors de l'enregistrement", "error");
            }
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Confirmer & obtenir mon pass';
            btn.disabled = false;
        });

        document.getElementById('downloadPassBtn').addEventListener('click', () => {
            const element = document.getElementById('ticketArea');
            html2canvas(element, { scale: 2, backgroundColor: '#fff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Pass_${document.getElementById('displayName').innerText}.png`;
                link.href = canvas.toDataURL();
                link.click();
                showMessage("Pass téléchargé", "success");
            }).catch(() => showMessage("Erreur téléchargement", "error"));
        });
    </script>
</body>
</html>
