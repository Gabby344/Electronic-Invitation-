<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation | Concilia & Rosin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --dark: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { font-family: 'Montserrat', sans-serif; background: #0f0f0f; color: white; overflow-x: hidden; }

        /* --- Carrousel --- */
        .carousel {
            position: relative; height: 100vh; width: 100%; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .carousel-slide {
            position: absolute; width: 100%; height: 100%; opacity: 0;
            transition: opacity 1.5s ease-in-out; background-size: cover; background-position: center;
        }
        .carousel-slide.active { opacity: 1; }
        .hero-overlay {
            position: absolute; z-index: 10; text-align: center;
            background: rgba(0,0,0,0.5); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid var(--glass);
        }

        /* --- Textes Surbrillants --- */
        .shimmer {
            font-family: 'Playfair Display', serif;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* --- Section RSVP Sécurisée --- */
        .section-rsvp { padding: 80px 20px; display: flex; justify-content: center; }
        .rsvp-card {
            background: white; color: var(--dark); padding: 40px;
            border-radius: 20px; max-width: 500px; width: 100%; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .form-group { margin-bottom: 15px; text-align: left; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; }

        .btn-gold {
            background: var(--gold-gradient); border: none; padding: 15px 30px;
            color: var(--dark); font-weight: 700; border-radius: 50px;
            cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn-gold:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* --- Ticket Digital --- */
        #ticket-result {
            display: none; background: #fff; color: #000; padding: 20px;
            border-radius: 10px; margin-top: 20px; position: relative;
        }
        #printable-invitation {
            background: #fff; padding: 20px; border: 2px solid #BF953F;
        }

        .creator-tag { font-size: 0.7rem; opacity: 0.4; margin-top: 50px; text-align: center; }
    </style>
</head>
<body>

    <div class="carousel">
        <div class="carousel-slide active" style="background-image: url('conciliaetrosin1.jpg')"></div>
        <div class="carousel-slide" style="background-image: url('conciliaetrosin2.jpg')"></div>
        <div class="carousel-slide" style="background-image: url('conciliaetrosin3.jpg')"></div>
        
        <div class="hero-overlay">
            <h1 class="shimmer" style="font-size: 3rem;">Invitation</h1>
            <p style="font-size: 1.5rem; font-style: italic;">Concilia & Rosin</p>
            <p style="margin-top: 20px;">Samedi 20 Juin 2026</p>
            <a href="#rsvp-section" class="btn-gold" style="display:inline-block; margin-top: 30px; width: auto;">Confirmer ma présence</a>
        </div>
    </div>

    <section class="section-rsvp" id="rsvp-section">
        <div class="rsvp-card">
            <h2 class="shimmer" style="font-size: 2rem; margin-bottom: 20px;">RSVP</h2>
            
            <!-- Sécurité : Code d'accès -->
            <div id="auth-zone">
                <p>Veuillez entrer le code d'invitation reçu :</p>
                <input type="text" id="access-code" placeholder="Code secret...">
                <button class="btn-gold" onclick="unlockForm()" style="margin-top:10px;">Accéder au formulaire</button>
            </div>

            <form id="rsvpForm" style="display: none;">
                <div class="form-group">
                    <label>Prénom & Nom</label>
                    <input type="text" id="fullname" required>
                </div>
                <div class="form-group">
                    <label>Nombre de personnes</label>
                    <select id="guests">
                        <option value="1">1 Personne (Solo)</option>
                        <option value="2">2 Personnes (Couple)</option>
                    </select>
                </div>
                <button type="submit" class="btn-gold">Obtenir mon Pass QR</button>
            </form>

            <div id="ticket-result">
                <div id="printable-invitation">
                    <h3 class="shimmer">Invitation Officielle</h3>
                    <p><strong>Invité:</strong> <span id="display-name"></span></p>
                    <div id="qrcode" style="display: flex; justify-content: center; margin: 15px 0;"></div>
                    <p style="font-size: 0.8rem;">Présentez ce QR Code à l'entrée.</p>
                </div>
                <button class="btn-gold" onclick="downloadInvitation()" style="margin-top: 15px; background: #000; color: #fff;">Télécharger l'image</button>
            </div>
        </div>
    </section>

    <p class="creator-tag">Créé par Gabby U & Vainqueur</p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASCqKVU-tchKTnjkwemo_8DORutXiGQCc",
            authDomain: "invitation-electronic.firebaseapp.com",
            projectId: "invitation-electronic",
            storageBucket: "invitation-electronic.firebasestorage.app",
            messagingSenderId: "896364908517",
            appId: "1:896364908517:web:61c45584bac322b8a0690c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- CARROUSEL ---
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 4000);

        // --- SÉCURITÉ ---
        window.unlockForm = function() {
            const code = document.getElementById('access-code').value;
            if(code.toLowerCase() === "rosin2026") { // CODE À CHANGER ICI
                document.getElementById('auth-zone').style.display = 'none';
                document.getElementById('rsvpForm').style.display = 'block';
            } else {
                alert("Code invalide. Veuillez vérifier votre carte d'invitation.");
            }
        };

        // --- FORMULAIRE & DOUBLONS ---
        document.getElementById('rsvpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('fullname').value;

            // Vérifier si déjà inscrit (Sécurité anti-doublon)
            const q = query(collection(db, "invites"), where("fullname", "==", name));
            const querySnapshot = await getDocs(q);
            
            if (!querySnapshot.empty) {
                alert("Cet invité est déjà enregistré !");
                return;
            }

            const docRef = await addDoc(collection(db, "invites"), {
                fullname: name,
                guests: document.getElementById('guests').value,
                timestamp: new Date()
            });

            generateTicket(docRef.id, name);
        });

        function generateTicket(id, name) {
            document.getElementById('rsvpForm').style.display = 'none';
            document.getElementById('ticket-result').style.display = 'block';
            document.getElementById('display-name').innerText = name;
            
            new QRCode(document.getElementById("qrcode"), {
                text: id, width: 150, height: 150, colorDark : "#1a1a1a"
            });
        }

        // --- TÉLÉCHARGEMENT ---
        window.downloadInvitation = function() {
            const ticket = document.getElementById('printable-invitation');
            html2canvas(ticket).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Invitation-Concilia-Rosin.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        };
    </script>
</body>
</html>
